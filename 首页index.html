<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商城首页</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
body{background:#f7f8fa;padding-bottom:60px;}
.search{padding:15px;}
.search input{width:100%;height:46px;border-radius:23px;border:1px solid #eee;padding:0 16px;outline:none;}
.banner{height:180px;background:#ff4d4f;margin:0 15px;border-radius:12px;overflow:hidden;}
.banner img{width:100%;height:100%;object-fit:cover;}
.cate{display:flex;gap:10px;padding:15px;overflow-x:auto;}
.cate span{padding:8px 14px;background:#fff;border-radius:20px;white-space:nowrap;}
.goods{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:15px;}
.item{background:#fff;border-radius:12px;overflow:hidden;}
.item img{width:100%;height:160px;object-fit:cover;}
.info{padding:12px;}
.info p{margin-bottom:6px;}
.name{font-size:15px;}
.price{color:#ff4d4f;font-size:16px;font-weight:bold;}
.btn{background:#ff4d4f;color:#fff;border:none;width:100%;padding:8px 0;border-radius:6px;margin-top:4px;}
.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;border-top:1px solid #eee;}
.nav span{flex:1;text-align:center;padding:14px 0;}
</style>
</head>

<body>

<div class="search">
<input id="searchInput" placeholder="搜索商品">
</div>

<div class="banner">
<img src="images/banner.jpg">
</div>

<div class="cate">
<span>全部</span><span>新品</span><span>热卖</span><span>推荐</span>
</div>

<div class="goods" id="list"></div>

<div class="nav">
<span onclick="goHome()">首页</span>
<span onclick="goCart()">购物车</span>
<span onclick="goService()">客服</span>
</div>

<script src="script.js"></script>
<script>
let goods = [
{id:1,name:"时尚商品1",image:"images/goods1.jpg",price:99},
{id:2,name:"经典商品2",image:"images/goods2.jpg",price:129},
{id:3,name:"热销商品3",image:"images/goods3.jpg",price:159},
{id:4,name:"新款商品4",image:"images/goods4.jpg",price:199}
]

function render(){
  let list = document.getElementById('list')
  list.innerHTML = ''
  goods.forEach(item=>{
    list.innerHTML += `
    <div class="item" onclick="goDetail(${item.id})">
      <img src="${item.image}">
      <div class="info">
        <p class="name">${item.name}</p>
        <p class="price">¥${item.price}</p>
        <button class="btn" onclick="addCart(${item.id},event)">加入购物车</button>
      </div>
    </div>
    `
  })
}

function goDetail(id){
  let item = goods.find(i=>i.id==id)
  localStorage.setItem('detail',JSON.stringify(item))
  location.href='detail.html'
}

function addCart(id,e){
  e.stopPropagation()
  let item = goods.find(i=>i.id==id)
  let cart = JSON.parse(localStorage.getItem('cart'))||[]
  cart.push(item)
  localStorage.setItem('cart',JSON.stringify(cart))
  alert('已加入购物车')
}

render()
</script>
</body>
</html>
